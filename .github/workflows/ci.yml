name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # TESTING BACKEND
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123456789
          POSTGRES_DB: my-postgre-db
        ports:
          - 5438:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d my-postgre-db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Database
        env:
          # psql automatically looks for this environment variable for the password
          PGPASSWORD: 123456789
        run: |
          until pg_isready -h 127.0.0.1 -p 5438 -U postgres -d my-postgre-db; do
            echo "Waiting for Postgres to open TCP connections..."
            sleep 2
          done
          
          psql -h 127.0.0.1 -p 5438 -U postgres -d my-postgre-db -f ./database/database.sql

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: cd backend && npm ci

      - name: Run Tests
        env:
          DB_USER: postgres
          DB_PASSWORD: 123456789
          DB_HOST: localhost
          DB_PORT: 5438
          DB_NAME: my-postgre-db
        run: cd backend && npm test

  # BUILD & PUSH DOCKER IMAGES
  build-and-push:
    name: Build and Push Images to Docker Hub
    needs: test # This ensures tests MUST pass before building
    runs-on: ubuntu-latest
    
    # We only want to build and push when code is merged to main branch, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-backend-cos1205:1.0

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-frontend-cos1205:1.0
    